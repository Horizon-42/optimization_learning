<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">Armijo backtracking line search decisions</title>
  <desc id="desc">A Python-generated table showing Armijo sufficient-decrease checks for alpha values 1, 0.5, and 0.25 in one BFGS line search.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="context-stroke"/>
    </marker>
    <style>
      .title { font: 700 25px Inter, Arial, sans-serif; fill: #172033; }
      .body { font: 14px Inter, Arial, sans-serif; fill: #5f6b7a; }
      .label { font: 700 15px Inter, Arial, sans-serif; fill: #172033; }
      .small { font: 12px Inter, Arial, sans-serif; fill: #5f6b7a; }
      .mono { font: 13px SFMono-Regular, Consolas, monospace; fill: #172033; }
      .decision { font: 700 15px Inter, Arial, sans-serif; }
    </style>
  </defs>
  <rect width="960" height="520" fill="#ffffff"/>
  <text x="36" y="48" class="title">Armijo backtracking is a shrink-until-pass test</text>
  <text x="36" y="78" class="body">This example starts at alpha = 1 and halves alpha until phi(alpha) is below the Armijo sufficient-decrease bound.</text>

  <rect x="52" y="112" width="856" height="78" rx="8" fill="#f8fafc" stroke="#d9e1ea"/>
  <text x="76" y="142" class="label">Accept when:</text>
  <text x="184" y="142" class="mono">phi(alpha) &lt;= phi(0) + c1 * alpha * phi'(0)</text>
  <text x="76" y="168" class="small">Here phi(0) = 1.924227, phi'(0) = -0.694236, c1 = 0.0001. Because phi'(0) is negative, the bound is slightly below phi(0).</text>
  
  <rect x="60" y="178" width="840" height="54" rx="8" fill="#fef2f2" stroke="#d9e1ea"/>
  <text x="86" y="214" class="mono">alpha = 1</text>
  <text x="232" y="214" class="mono">phi(alpha) = 4.175457</text>
  <text x="482" y="214" class="mono">Armijo bound = 1.924158</text>
  <text x="774" y="214" class="decision" fill="#dc2626">reject</text>

  <path d="M480 238 L480 258" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="500" y="256" class="small">multiply by beta = 0.5</text>

  <rect x="60" y="248" width="840" height="54" rx="8" fill="#fef2f2" stroke="#d9e1ea"/>
  <text x="86" y="284" class="mono">alpha = 0.5</text>
  <text x="232" y="284" class="mono">phi(alpha) = 1.984201</text>
  <text x="482" y="284" class="mono">Armijo bound = 1.924193</text>
  <text x="774" y="284" class="decision" fill="#dc2626">reject</text>

  <path d="M480 308 L480 328" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="500" y="326" class="small">multiply by beta = 0.5</text>

  <rect x="60" y="318" width="840" height="54" rx="8" fill="#ecfdf5" stroke="#d9e1ea"/>
  <text x="86" y="354" class="mono">alpha = 0.25</text>
  <text x="232" y="354" class="mono">phi(alpha) = 1.821949</text>
  <text x="482" y="354" class="mono">Armijo bound = 1.924210</text>
  <text x="774" y="354" class="decision" fill="#0f766e">accept</text>

  <text x="60" y="454" class="body">This is not binary search: there is no bracketed interval whose midpoint is repeatedly tested. Backtracking only shrinks a too-large trial step.</text>
</svg>
