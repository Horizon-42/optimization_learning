      <line x1="283.5" y1="386.0" x2="283.5" y2="373.8" stroke="#0f766e" stroke-width="1.6" stroke-dasharray="6 6"/>
      <circle cx="283.5" cy="373.8" r="7" fill="#0f766e" stroke="white" stroke-width="2"/>
      <text x="293.5" y="355.8" class="label" fill="#0f766e">alpha=0.25: accept</text>
    
  
      <line x1="86.0" y1="386.0" x2="86.0" y2="392.0" stroke="#94a3b8" stroke-width="1"/>
      <text x="86.0" y="410.0" text-anchor="middle" class="small">0</text>
    
      <line x1="283.5" y1="386.0" x2="283.5" y2="392.0" stroke="#94a3b8" stroke-width="1"/>
