  <text x="481.0" y="448" text-anchor="middle" class="axis">step length alpha</text>
  <text x="44" y="250" text-anchor="middle" transform="rotate(-90 44 250)" class="axis">phi(alpha) = f(x_k + alpha p_k)</text>
