  <line x1="219.55" y1="72" x2="219.55" y2="402" stroke="#16a34a" stroke-width="1.4" stroke-dasharray="5 6" /><circle cx="219.55" cy="395.89" r="5.5" fill="#16a34a" stroke="white" stroke-width="2" /><text x="227.55" y="383.89" font-size="13" fill="#16a34a" font-weight="700">accepted alpha 0.29</text>
